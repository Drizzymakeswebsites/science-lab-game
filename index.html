<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Modern Gaming Website</title>\n    <style>\n        body {\n            margin: 0;\n            font-family: 'Arial', sans-serif;\n            background: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0.5));\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n        }\n        .container {\n            backdrop-filter: blur(10px);\n            background: rgba(255, 255, 255, 0.1);\n            border-radius: 15px;\n            padding: 20px;\n            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);\n            text-align: center;\n            color: white;\n            animation: fadeIn 1.5s;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; }\n            to { opacity: 1; }\n        }\n        h1 {\n            font-size: 2.5em;\n            text-shadow: 0 0 5px rgba(255, 0, 255, 0.7);\n        }\n        p {\n            font-size: 1.2em;\n            color: #ccc;\n        }\n        .button {\n            margin-top: 20px;\n            padding: 10px 20px;\n            background: linear-gradient(90deg, rgba(255, 0, 255, 1), rgba(0, 255, 255, 1));\n            border: none;\n            border-radius: 5px;\n            color: white;\n            font-size: 1.2em;\n            cursor: pointer;\n            transition: transform 0.3s;\n        }\n        .button:hover {\n            transform: scale(1.1);\n        }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h1>Welcome to the Science Lab Game!</h1>\n        <p>Experience the thrill of science with an immersive gaming experience.</p>\n        <button class="button">Start Game</button>\n    </div>\n</body>\n</html>\n
