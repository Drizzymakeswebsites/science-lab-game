<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>CPS Clicker Game</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            text-align: center;\n            padding: 20px;\n        }\n        #clickableBox {\n            width: 100px;\n            height: 100px;\n            background-color: #4CAF50;\n            color: white;\n            border: none;\n            cursor: pointer;\n            margin-bottom: 20px;\n        }\n        #backButton {\n            margin-top: 20px;\n            padding: 10px 20px;\n            background-color: #f44336;\n            color: white;\n            border: none;\n            cursor: pointer;\n        }\n    </style>\n</head>\n<body>\n    <h1>CPS Clicker Game</h1>\n    <div id="clickableBox">Click Me!</div>\n    <h2>Click Count: <span id="clickCount">0</span></h2>\n    <h2>CPS: <span id="cpsDisplay">0</span></h2>\n    <h2>Time: <span id="timer">30</span> seconds</h2>\n    <button id="backButton" onclick="goBack()">Back to Game Selection</button>\n    <script>\n        let clickCount = 0;\n        let cps = 0;\n        let timerDuration = 30;\n        let timerId = null;\n        let intervalId = null;\n\n        document.getElementById('clickableBox').addEventListener('click', () => {\n            clickCount++;\n        });\n\n        function startGame() {\n            clickCount = 0;\n            cps = 0;\n            timerDuration = 30;\n            document.getElementById('clickCount').innerText = clickCount;\n            document.getElementById('cpsDisplay').innerText = cps;\n            document.getElementById('timer').innerText = timerDuration;\n            clearInterval(timerId);\n            clearInterval(intervalId);\n            timerId = setInterval(() => {\n                if (timerDuration <= 0) {\n                    clearInterval(timerId);\n                    clearInterval(intervalId);\n                    return;\n                }\n                timerDuration--;\n                document.getElementById('timer').innerText = timerDuration;\n            }, 1000);\n            intervalId = setInterval(() => {\n                cps = clickCount;\n                document.getElementById('cpsDisplay').innerText = cps;\n                clickCount = 0;\n            }, 1000);\n        }\n\n        function goBack() {\n            window.location.href = 'game_selection.html';\n        }\n\n        startGame();\n    </script>\n</body>\n</html>\n
